                                <ProductCard key={product.id} product={product} onView={onViewProduct} />
                            ))}
                        </div>
                    </div>
                </section>
            </div>
        );

        const Shop = ({ onViewProduct }) => {
            const [filter, setFilter] = useState('All');
            const categories = ['All', 'Ghee', 'Honey'];

            const filteredProducts = filter === 'All' ? products : products.filter(p => p.category === filter);

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 animate-fade-in">
                    <div className="text-center mb-16">
                        <h1 className="font-serif text-5xl font-bold text-gray-900 mb-6">Our Collection</h1>
                        <p className="text-gray-600 max-w-2xl mx-auto text-lg">Browse our selection of premium, ethically sourced organic products.</p>
                    </div>

                    {/* Filters */}
                    <div className="flex justify-center gap-4 mb-12">
                        {categories.map(cat => (
                            <button
                                key={cat}
                                onClick={() => setFilter(cat)}
                                className={`px-6 py-2 rounded-full font-medium transition-all ${filter === cat ? 'bg-brand-green text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200 hover:border-brand-green hover:text-brand-green'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    {/* Grid */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                        {filteredProducts.map(product => (
                            <ProductCard key={product.id} product={product} onView={onViewProduct} />
                        ))}
                    </div>
                </div>
            );
        };

        const ProductDetail = ({ product, onBack, onAddToCart }) => {
            if (!product) return null;

            const initialIdx = product.selectedVariantIdx || 0;
            const [selectedIdx, setSelectedIdx] = useState(initialIdx);
            const [quantity, setQuantity] = useState(1);

            useEffect(() => {
                if (product.selectedVariantIdx !== undefined) {
                    setSelectedIdx(product.selectedVariantIdx);
                }
            }, [product.selectedVariantIdx]);

            const variant = product.variants[selectedIdx];
            const title = variant.folderName;

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 animate-fade-in">
                    <button onClick={onBack} className="inline-flex items-center text-gray-500 hover:text-brand-green mb-8 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clipRule="evenodd" /></svg>
                        Back to Shop
                    </button>

                    <div className="bg-white rounded-3xl p-5 md:p-8 shadow-sm border border-brand-stone/30 grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">
                        <div className="aspect-square rounded-2xl overflow-hidden bg-brand-stone/10 border border-brand-stone/20">
                            <img
                                src={variant.image}
                                alt={title}
                                className="w-full h-full object-cover transition-opacity duration-300"
                            />
                        </div>

                        <div className="flex flex-col justify-center">
                            <span className="text-brand-terracotta font-semibold tracking-wider text-sm uppercase mb-3">
                                {product.category}
                            </span>
                            <h1 className="font-serif text-3xl md:text-4xl lg:text-5xl font-bold text-gray-900 mb-4">{title}</h1>
                            <div className="text-3xl font-light text-brand-green mb-6">₹{variant.price}</div>

                            <div className="prose prose-brand mb-8">
                                <p className="text-gray-600 text-lg leading-relaxed">{product.description}</p>
                            </div>

                            {product.variants.length > 1 && (
                                <div className="mb-8">
                                    <h3 className="text-sm font-semibold text-gray-900 mb-3 uppercase tracking-wider">Select Size</h3>
                                    <div className="flex flex-wrap gap-3">
                                        {product.variants.map((v, idx) => (
                                            <button
                                                key={v.weight}
                                                onClick={() => setSelectedIdx(idx)}
                                                className={`px-4 py-2 rounded-xl border-2 transition-all ${idx === selectedIdx ? 'border-brand-green bg-brand-green/5 text-brand-green font-semibold' : 'border-gray-200 text-gray-600 hover:border-brand-green/50'}`}
                                            >
                                                {v.weight}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="border-t border-brand-stone/50 pt-8 mt-auto">
                                <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 sm:gap-6 mb-6">
                                    <div className="flex justify-center items-center border border-gray-300 rounded-full bg-white self-center sm:self-auto">
                                        <button onClick={() => setQuantity(Math.max(1, quantity - 1))} className="px-6 py-3 md:px-4 md:py-3 text-gray-500 hover:text-brand-green transition-colors">−</button>
                                        <span className="w-10 md:w-8 text-center font-medium">{quantity}</span>
                                        <button onClick={() => setQuantity(quantity + 1)} className="px-6 py-3 md:px-4 md:py-3 text-gray-500 hover:text-brand-green transition-colors">+</button>
                                    </div>
                                    <button
                                        onClick={() => { onAddToCart({ ...product, name: title, price: variant.price }, quantity); onBack(); }}
                                        className="w-full sm:flex-1 bg-brand-accent hover:bg-brand-accentDark text-white py-4 rounded-full font-bold text-lg transition-all shadow-md hover:shadow-lg hover:-translate-y-1"
                                    >
                                        Add to Cart
                                    </button>
                                </div>
                                <div className="flex items-center gap-2 text-sm text-gray-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-green-600" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
                                    100% Secure Checkout & Easy Returns
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const About = () => (
            <div className="animate-fade-in relative z-10">
                <div className="bg-brand-green text-white py-16 md:py-24 text-center px-4">
                    <h1 className="font-serif text-4xl md:text-5xl font-bold mb-4 md:mb-6">Our Mission</h1>
                    <p className="text-lg md:text-xl max-w-3xl mx-auto text-white/90">
                        To bring the purest, most natural organic products from traditional Indian farms directly to your table, preserving ancient methods and health benefits.
                    </p>
                </div>

                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 space-y-24">
                    {/* Zigzag Row 1 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                        <div className="rounded-2xl overflow-hidden shadow-2xl h-[500px]">
                            <img src="assets/A2 Cow Ghee 500 gm/DSC05252.png" loading="lazy" className="w-full h-full object-cover hover:scale-110 transition-transform duration-700" alt="A2 Cow Ghee" />
                        </div>
                        <div>
                            <h2 className="font-serif text-4xl font-bold text-gray-900 mb-6">The Laarsa Organic Story</h2>
                            <p className="text-gray-600 text-lg leading-relaxed mb-6">
                                Laarsa Organic India Pvt Ltd was born out of a deep respect for traditional farming and natural living. We noticed a gap between what nature provides and what reaches our modern kitchens.
                            </p>
                            <p className="text-gray-600 text-lg leading-relaxed mb-6">
                                By reviving age-old methods like the traditional bilona process, we ensure that the nutritional value and purity of our products remain completely uncompromised.
                            </p>
                        </div>
                    </div>

                    {/* Zigzag Row 2 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                        <div className="order-2 lg:order-1">
                            <h2 className="font-serif text-4xl font-bold text-gray-900 mb-6">Ethically Sourced & Pure</h2>
                            <p className="text-gray-600 text-lg leading-relaxed mb-6">
                                Partnering directly with tribal honey gatherers and traditional A2 cow dairy farmers allows us to promise you 100% pure products, free from any artificial additives.
                            </p>
                            <p className="text-brand-terracotta font-semibold text-xl font-serif">
                                Experience the true essence of purity.
                            </p>
                        </div>
                        <div className="rounded-2xl overflow-hidden shadow-2xl h-[500px] order-1 lg:order-2">
                            <img src="assets/Natural honey 1kg/DSC05246.png" loading="lazy" className="w-full h-full object-cover hover:scale-110 transition-transform duration-700" alt="Natural Honey" />
                        </div>
                    </div>
                </div>
            </div>
        );

        const Contact = () => (
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 animate-fade-in">
                <div className="text-center mb-16">
                    <h1 className="font-serif text-5xl font-bold text-gray-900 mb-6">Get in Touch</h1>
                    <p className="text-gray-600 max-w-2xl mx-auto text-lg">Have a question about our products or your order? We'd love to hear from you.</p>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                    <div className="lg:col-span-1 space-y-8">
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-brand-stone/30">
                            <h3 className="font-serif text-2xl font-semibold mb-6">Contact Information</h3>
                            <div className="space-y-4 text-gray-600">
                                <p className="flex items-start gap-3">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-brand-green flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                    <span>Laarsa Organic India Pvt Ltd<br />Plot no.49, 2nd Floor, Sector-31, Site-IV, Greater Noida, Uttar Pradesh,<br />India, 201310</span>
                                </p>
                                <p className="flex items-center gap-3">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-brand-green flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                                    marketing@laarsaorganic.com
                                </p>
                                <p className="flex items-center gap-3">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-brand-green flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                    +91 84488 13497
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="lg:col-span-2">
                        <form className="bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-brand-stone/30" onSubmit={(e) => { e.preventDefault(); alert('Thank you for reaching out. We will get back to you soon!'); }}>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                                    <input type="text" className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-green focus:border-brand-green outline-none transition-all" required />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                                    <input type="text" className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-green focus:border-brand-green outline-none transition-all" required />
                                </div>
                            </div>
                            <div className="mb-6">
                                <label className="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                                <input type="email" className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-green focus:border-brand-green outline-none transition-all" required />
                            </div>
                            <div className="mb-6">
                                <label className="block text-sm font-medium text-gray-700 mb-2">Message</label>
                                <textarea rows="5" className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-green focus:border-brand-green outline-none transition-all resize-none" required></textarea>
                            </div>
                            <button type="submit" className="w-full bg-brand-green hover:bg-brand-greenDark text-white py-4 rounded-xl font-semibold transition-all shadow-lg hover:shadow-brand-green/30">
                                Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        );

        // Main App
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [cartCount, setCartCount] = useState(0);

            // Hash routing simulation for back button support
            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '') || 'home';
                    if (hash.startsWith('product-')) {
                        const id = parseInt(hash.split('-')[1]);
                        const prod = products.find(p => p.id === id);
                        if (prod) {
                            setSelectedProduct(prod);
                            setCurrentPage('product');
                        }
                    } else {
                        setSelectedProduct(null);
                        setCurrentPage(hash);
                    }
                    window.scrollTo(0, 0);
                };

                window.addEventListener('hashchange', handleHashChange);
                handleHashChange(); // initial check
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const navigate = (page) => {
                window.location.hash = page;
            };

            const viewProduct = (product) => {
                window.location.hash = `product-${product.id}`;
            };

            const addToCart = (product, qty) => {
                setCartCount(prev => prev + qty);
                alert(`Added ${qty}x ${product.name} to cart!`);
            };

            return (
                <>
                    <Navbar navigate={navigate} cartCount={cartCount} />

                    <main className="flex-grow">
                        {currentPage === 'home' && <Home navigate={navigate} onViewProduct={viewProduct} />}
                        {currentPage === 'shop' && <Shop onViewProduct={viewProduct} />}
                        {currentPage === 'about' && <About />}
                        {currentPage === 'contact' && <Contact />}
                        {currentPage === 'product' && <ProductDetail product={selectedProduct} onBack={() => navigate('shop')} onAddToCart={addToCart} />}
                    </main>

                    <Footer navigate={navigate} />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
